name: Bug report
description: Report incorrect or unexpected base-2 exponentiation behavior.
labels: ["bug"]
body:
  - type: input
    id: exponent
    attributes:
      label: Exponent
      description: The value of n passed to two_pow.
      placeholder: "10"
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected result
      placeholder: "1024"
    validations:
      required: true
  - type: input
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, and version.
    validations:
      required: true
