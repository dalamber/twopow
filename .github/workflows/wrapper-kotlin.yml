name: Kotlin

on:
  push:
    branches: [main]
    paths: ["wrappers/kotlin/**", "src/**", "include/**", "bindings/c/**", ".github/workflows/wrapper-kotlin.yml"]
  pull_request:
    branches: [main]
    paths: ["wrappers/kotlin/**", "src/**", "include/**", "bindings/c/**", ".github/workflows/wrapper-kotlin.yml"]

jobs:
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - name: Build native and test
        run: |
          cd wrappers/kotlin
          bash build-native.sh
          gradle test --no-daemon
