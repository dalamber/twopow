name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          clang-format --dry-run --Werror \
            include/twopow/twopow.hpp src/twopow.cpp app/main.cpp \
            tests/twopow_test.cpp tests/cli_test.cpp \
            benchmarks/twopow_benchmark.cpp

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake
      - name: Configure (compile commands)
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DTWOPOW_BUILD_TESTS=OFF
      - name: Run clang-tidy
        run: clang-tidy -p build src/twopow.cpp app/main.cpp
