name: Ruby

on:
  push:
    branches: [main]
    paths: ["wrappers/ruby/**", "src/**", "include/**", "bindings/c/**", ".github/workflows/wrapper-ruby.yml"]
  pull_request:
    branches: [main]
    paths: ["wrappers/ruby/**", "src/**", "include/**", "bindings/c/**", ".github/workflows/wrapper-ruby.yml"]

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build extension and test
        run: |
          cd wrappers/ruby/ext/twopow
          ruby extconf.rb
          make
          cd ../..
          ruby -I lib -I ext/twopow test/test_twopow.rb
