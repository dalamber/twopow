name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,portability,performance \
            --std=c++20 --language=c++ \
            --error-exitcode=1 --inline-suppr \
            --suppress=missingIncludeSystem \
            -DTWOPOW_VERSION='"0.2.0"' \
            -Iinclude \
            src app

  scan-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install clang static analyzer
        run: sudo apt-get update && sudo apt-get install -y clang-tools cmake
      - name: Configure under scan-build
        run: scan-build cmake -S . -B build -DTWOPOW_BUILD_TESTS=OFF
      - name: Analyze
        run: scan-build --status-bugs cmake --build build
